<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Widget - Lumea Perdelelor</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #f8f5f2, #ffffff);
      color: #1f2937;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 140px;
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(122, 90, 67, 0.1);
      color: #7a5a43;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 52px;
      line-height: 1.05;
      max-width: 760px;
    }

    p {
      max-width: 760px;
      font-size: 18px;
      line-height: 1.7;
      color: #4b5563;
    }

    .card {
      margin-top: 40px;
      padding: 28px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow: 0 18px 50px rgba(2, 6, 23, 0.08);
      max-width: 720px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">Pagină test widget</div>
    <h1>Lumea Perdelelor</h1>
    <p>
      Asta e o pagină simplă de test pentru widget. Uită-te în dreapta jos și ar trebui să vezi bulina de chat.
    </p>

    <div class="card">
      <strong>Test local</strong>
      <p>
        Dacă widgetul apare și răspunde, e bun pentru urcat pe Render și pus după aia pe site-ul clientului.
      </p>
    </div>
  </div>

  <script src="/widget/widget-lumea-perdelelor.js" defer></script>
</body>
</html>
