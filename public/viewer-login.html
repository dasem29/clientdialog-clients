<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientDialog · Viewer Login</title>
  <style>
    :root {
      --bg: #070b14;
      --panel: rgba(16, 21, 36, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #eef2ff;
      --muted: #95a1c6;
      --accent: #8b5cf6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139,92,246,0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(34,211,238,0.08), transparent 18%),
        linear-gradient(180deg, #070b14 0%, #04070d 100%);
      color: var(--text);
      display: grid;
      place-items: center;
    }

    .card {
      width: min(420px, calc(100vw - 24px));
      padding: 24px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .title {
      font-size: 22px;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    form {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">ClientDialog Viewer</div>
    <div class="subtitle">Autentificare pentru conversații și date sensibile</div>

    <form method="POST" action="/viewer-login">
      <input name="username" type="text" placeholder="Username" required />
      <input name="password" type="password" placeholder="Parolă" required />
      <button type="submit">Intră</button>
    </form>

    <div class="hint">Acces intern protejat.</div>
  </div>
</body>
</html>
